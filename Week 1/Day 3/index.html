<!DOCTYPE html>
<html>
<head>
    <title>Lists Tables Forms</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <h1>HTML Lists</h1>

    <h2>Favorite Foods</h2>

    <ul>
        <li>Pizza</li>
        <li>Burger</li>
        <li>Pasta</li>
    </ul>

    <h2>Daily Tasks</h2>

    <ol>
        <li>Wake Up</li>
        <li>Study</li>
        <li>Practice Coding</li>
    </ol>

    <h1>Student Report Table</h1>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
        </tr>

        <tr>
            <td>Mehul</td>
            <td>HTML</td>
            <td>90</td>
            <td>A</td>
        </tr>
    </table>

    <h1>Contact Form</h1>

    <form>
        <label>Name:</label>
        <input type="text">

        <br><br>

        <label>Email:</label>
        <input type="email">

        <br><br>

        <label>Password:</label>
        <input type="password">

        <br><br>

        <input type="submit">
    </form>

</body>
</html>
